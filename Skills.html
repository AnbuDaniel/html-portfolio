<!DOCTYPE html>
<html lang="en">
<head>

        *{

    padding: 10px;

    outline: none;

    html{
        font-size: 63%;
    }

    body{

        <ul>
            <li> Frontend Technologies: HTML, CSS, JavaScript, React</li>

</html>
