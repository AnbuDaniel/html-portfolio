<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills</title>

    <style>
        *{
    margin: 10px;
    padding: 10px;
    box-sizing: border-box;
    border: none;
    outline: none;
    font-family: 'Poppins', sans-serif;
    text-decoration: none;
    }

    html{
        font-size: 63%;
    }

    body{
        width: 100%;
        height: 100vh;
        background-color: black;
        color: #b74b4b;
        
    }

    h1.header{
        font-size: 4rem;
        font-weight: 600;
        text-align: center;
        text-decoration: underline;
    }
    .content{
        width: 80%;
        margin: auto;
        font-size: 2rem;
    }

    .content:hover{
        color: rgb(214, 228, 16);
        transform: scale(1.05);
    }

    .header:hover {
        color: rgb(214, 228, 16);
        transform: scale(1.05);
    }

    .certificate{
        font-size: 4rem;
        font-weight: 600;
        text-align: center;
        text-decoration: underline;
    }
     .certificate:hover {
        color: rgb(214, 228, 16);
        transform: scale(1.05);
    }
     ul{
        list-style-type: square;
        padding-left: 20px;
    }
     li{
        margin-bottom: 10px;
    }
     @media (max-width: 768px) {
        html {
            font-size: 50%;
        }
    }
     @media (max-width: 480px) {
        html {
            font-size: 40%;
        }
    }
     @media (max-width: 320px) {
        html {
            font-size: 30%;
        }
    }
    
    </style>
</head>
<body>

    <h1 class="header">TECHNICAL SKILLS</h1>
    <div class="content">
    
        <ul>
            <li> Frontend Technologies: HTML, CSS, JavaScript, React</li>
            <li> Frameworks & Tools: Bootstrap</li>
            <li> Version Control: GitHub</li>
            <li> Web Design: Responsive Design, UI Layouts</li>
            <li> Other Skills: Problem Solving, Communication, Team Collaboration</li>
        </ul>
    </div>
     <div>
        <h1 class="certificate">CERTIFICATES</h1>
        <img src="./assets/Certificate.jpg" alt="Certificate" style="display: block; margin: 20px auto; width: 50%; border: 2px solid #b74b4b; border-radius: 10px;">
    </div>
    
</body>
</html>
